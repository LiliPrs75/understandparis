<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Understand Paris</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #111;
      --ink-faint: #777;
      --coral: #ff6b5e;
      --bg: #f7f5f2;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid #ddd;
      letter-spacing: 0.05em;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 40px 20px;
      position: relative;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(48px, 10vw, 110px);
      line-height: 1;
    }

    .headline em {
      color: var(--coral);
      font-style: italic;
    }

    .subtext {
      max-width: 400px;
      margin-top: 20px;
      color: var(--ink-faint);
      font-size: 16px;
    }

    .image {
      margin-top: 40px;
      height: 70vh;
      background: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=1600') center/cover no-repeat;
    }

    .side-left, .side-right {
      position: fixed;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--ink-faint);
    }

    .side-left { left: -60px; }
    .side-right { right: -60px; }

    .footer {
      font-family: 'Playfair Display', serif;
      font-size: clamp(70px, 13vw, 200px);
      margin-top: 60px;
      text-align: center;
    }

    .rule {
      border-top: 1px solid #ccc;
      margin: 30px 0;
    }

  </style>
</head>
<body>

  <div class="meta">
    <span>UP—001</span>
    <span>Understand Paris</span>
    <span>Curated Journeys</span>
    <span>001</span>
  </div>

  <div class="side-left">LOCAL KNOWLEDGE</div>
  <div class="side-right">CURATED EXPERIENCES</div>

  <div class="container">

    <div class="rule"></div>

    <h1 class="headline">
      Understand Paris,<br>
      <em>your way.</em>
    </h1>

    <p class="subtext">
      A bespoke travel consultancy for curious minds seeking authentic, elegant and meaningful experiences in Paris.
    </p>

    <div class="image"></div>

    <div class="rule"></div>

    <div class="footer">Open Design</div>

  </div>

</body>
</html>
